<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>hey.</title>
  <link href="https://fonts.googleapis.com/css2?family=Clash+Display:wght@400;500;600;700&family=Cabinet+Grotesk:wght@400;500;700;800&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f0f13;
      --card: #17171e;
      --border: #2a2a35;
      --fg: #f0f0f5;
      --muted: #6b6b80;
      --c1: #7c6ff7; /* purple */
      --c2: #f7a24e; /* orange */
      --c3: #4ecff7; /* cyan */
      --c4: #7cf7a2; /* mint */
    }

    body {
      min-height: 100vh;
      background: var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Plus Jakarta Sans', sans-serif;
      overflow: hidden;
    }

    /* Ambient glow blobs */
    .glow {
      position: fixed;
      border-radius: 50%;
      filter: blur(120px);
      opacity: 0.12;
      pointer-events: none;
    }
    .glow-1 { width: 500px; height: 500px; background: var(--c1); top: -150px; left: -100px; }
    .glow-2 { width: 400px; height: 400px; background: var(--c2); bottom: -100px; right: -80px; }
    .glow-3 { width: 300px; height: 300px; background: var(--c3); top: 50%; left: 50%; transform: translate(-50%,-50%); }

    /* Card */
    .card {
      position: relative;
      z-index: 10;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 52px 48px 44px;
      width: 90%;
      max-width: 460px;
      box-shadow: 0 0 0 1px rgba(255,255,255,0.04), 0 24px 64px rgba(0,0,0,0.5);
    }

    /* Top pill */
    .pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(124,111,247,0.12);
      border: 1px solid rgba(124,111,247,0.25);
      border-radius: 50px;
      padding: 5px 14px;
      font-size: 0.7rem;
      font-weight: 600;
      color: var(--c1);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-bottom: 40px;
      opacity: 0;
      animation: fadeUp 0.5s ease 0.3s forwards;
    }
    .pill-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--c1);
      animation: pulse 2s ease infinite;
    }
    @keyframes pulse {
      0%,100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    /* Stage */
    #stage {
      min-height: 150px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      transition: opacity 0.3s ease, transform 0.3s ease;
    }
    #stage.out { opacity: 0; transform: translateY(-10px); }

    .main-text {
      font-size: clamp(2rem, 7vw, 2.8rem);
      font-weight: 800;
      color: var(--fg);
      line-height: 1.15;
      opacity: 0;
      transform: translateY(18px);
      transition: opacity 0.5s ease, transform 0.5s ease;
    }
    .main-text.show { opacity: 1; transform: translateY(0); }

    /* Colored word highlight */
    .hl { 
      background: linear-gradient(90deg, var(--c1), var(--c3));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .hl-orange {
      background: linear-gradient(90deg, var(--c2), #f7d04e);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .hl-mint {
      background: linear-gradient(90deg, var(--c4), var(--c3));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .sub-text {
      font-size: 1rem;
      color: var(--muted);
      font-weight: 400;
      opacity: 0;
      transform: translateY(10px);
      transition: opacity 0.5s ease 0.2s, transform 0.5s ease 0.2s;
    }
    .sub-text.show { opacity: 1; transform: translateY(0); }

    .mono-text {
      font-family: 'Space Mono', monospace;
      font-size: clamp(1.3rem, 4.5vw, 1.9rem);
      color: var(--c4);
      letter-spacing: 0.06em;
      opacity: 0;
      transform: translateY(14px);
      transition: opacity 0.55s ease 0.1s, transform 0.55s ease 0.1s;
    }
    .mono-text.show { opacity: 1; transform: translateY(0); }

    /* Button */
    .btn-row {
      margin-top: 28px;
      opacity: 0;
      transform: translateY(10px);
      transition: opacity 0.5s ease 0.35s, transform 0.5s ease 0.35s;
    }
    .btn-row.show { opacity: 1; transform: translateY(0); }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: linear-gradient(135deg, var(--c1), var(--c3));
      color: #fff;
      border: none;
      padding: 13px 30px;
      border-radius: 10px;
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: 0.01em;
      box-shadow: 0 4px 24px rgba(124,111,247,0.3);
      transition: transform 0.2s, box-shadow 0.2s, opacity 0.2s;
    }
    .btn:hover { transform: translateY(-2px); box-shadow: 0 8px 32px rgba(124,111,247,0.45); }
    .btn:active { transform: scale(0.97); }

    /* Progress dots */
    .dots {
      display: flex;
      gap: 6px;
      margin-top: 44px;
      align-items: center;
    }
    .dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--border);
      transition: all 0.4s ease;
    }
    .dot.active {
      width: 22px;
      border-radius: 3px;
      background: linear-gradient(90deg, var(--c1), var(--c3));
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div class="glow glow-1"></div>
  <div class="glow glow-2"></div>
  <div class="glow glow-3"></div>

  <div class="card">
    <div class="pill"><span class="pill-dot"></span>pesan dari gw</div>
    <div id="stage"></div>
    <div class="dots" id="dots"></div>
  </div>

<script>
  const steps = [
    {
      main: '<span class="hl">Hai.</span>',
      auto: 1800
    },
    {
      main: 'gw <span class="hl">Ahmad.</span>',
      auto: 2200
    },
    {
      main: 'gw mau <span class="hl-orange">minta maaf</span>',
      sub: 'soal spam telp itu.',
      auto: 3200
    },
    {
      main: 'lu <span class="hl">maafin</span> gk?',
      button: true
    },
    {
      main: 'nih <span class="hl-mint">hadiah ultah</span>',
      sub: 'yang waktu itu dijanjiin.',
      auto: 2800
    },
    {
      mono: true,
      main: '083193440027',
      sub: 'simpan ya.'
    }
  ];

  const stage = document.getElementById('stage');
  const dotsEl = document.getElementById('dots');

  // Build dots
  steps.forEach((_, i) => {
    const d = document.createElement('div');
    d.className = 'dot' + (i === 0 ? ' active' : '');
    dotsEl.appendChild(d);
  });

  function updateDots(i) {
    document.querySelectorAll('.dot').forEach((d, idx) => {
      d.classList.toggle('active', idx === i);
    });
  }

  function render(i) {
    updateDots(i);
    const s = steps[i];
    stage.innerHTML = '';

    if (s.mono) {
      const el = document.createElement('div');
      el.className = 'mono-text';
      el.textContent = s.main;
      stage.appendChild(el);
      if (s.sub) {
        const sub = document.createElement('div');
        sub.className = 'sub-text';
        sub.textContent = s.sub;
        stage.appendChild(sub);
        setTimeout(() => sub.classList.add('show'), 400);
      }
      requestAnimationFrame(() => requestAnimationFrame(() => el.classList.add('show')));
    } else {
      const el = document.createElement('div');
      el.className = 'main-text';
      el.innerHTML = s.main;
      stage.appendChild(el);
      requestAnimationFrame(() => requestAnimationFrame(() => el.classList.add('show')));

      if (s.sub) {
        const sub = document.createElement('div');
        sub.className = 'sub-text';
        sub.textContent = s.sub;
        stage.appendChild(sub);
        setTimeout(() => sub.classList.add('show'), 150);
      }
    }

    if (s.button) {
      const row = document.createElement('div');
      row.className = 'btn-row';
      const btn = document.createElement('button');
      btn.className = 'btn';
      btn.innerHTML = 'Maaf &nbsp;→';
      btn.onclick = () => transition(i + 1);
      row.appendChild(btn);
      stage.appendChild(row);
      setTimeout(() => row.classList.add('show'), 250);
    } else if (s.auto) {
      setTimeout(() => transition(i + 1), s.auto);
    }
  }

  function transition(i) {
    if (i >= steps.length) return;
    stage.classList.add('out');
    setTimeout(() => {
      stage.classList.remove('out');
      render(i);
    }, 320);
  }

  render(0);
</script>
</body>
</html>
